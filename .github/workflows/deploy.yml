name: Deploy to LH.pl

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Show versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Copy .htaccess to dist
        run: cp public/.htaccess dist/.htaccess

      - name: Copy mascot email image to dist
        run: cp public/getrido-mascot-email.png dist/getrido-mascot-email.png

      - name: Debug - List dist contents
        run: |
          echo "=== dist/ root ==="
          ls -la dist/
          echo "=== dist/lovable-uploads/ ==="
          ls -la dist/lovable-uploads/ || echo "No lovable-uploads folder!"
          echo "=== dist/assets/ ==="
          ls -la dist/assets/ | head -20 || echo "No assets folder!"

      - name: Upload to LH.pl
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /public_html/getrido-test.pl/
          local-dir: dist/
          dangerous-clean-slate: true
